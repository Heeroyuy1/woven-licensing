# =============================================================================
# Woven Model Licensing Server — Production Nginx Configuration
# =============================================================================
# This config serves as the reverse proxy for the Licensing API and static
# portal files. It handles SSL termination, rate limiting, caching, and
# security hardening.
#
# Expected deployment layout:
#   /etc/nginx/conf.d/default.conf  ← this file
#   /var/www/portal/                 ← licensing portal static files
#   /etc/letsencrypt/live/example.com/  ← SSL certs (if using HTTPS)
# =============================================================================

upstream licensing_api {
    # The api service from docker-compose — resolves to container IP
    server licensing-api:8000 max_fails=3 fail_timeout=30s;
}

# ── HTTP (port 80) — Redirect to HTTPS or serve directly ──────────────────────
server {
    listen 80 default_server;
    server_name _;

    # Portal static files
    root /var/www/portal;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;

    # ── Rate Limiting Zones ──────────────────────────────────
    # Rate limit by IP for sensitive endpoints
    limit_req_zone $binary_remote_addr zone=activate:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=1000r/m;
    limit_req_zone $binary_remote_addr zone=customer:10m rate=60r/m;

    # ── API Proxy ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;

        proxy_pass http://licensing_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # Body size
        client_max_body_size 1M;

        # Pass through CORS headers from backend
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;

        # CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Rate limit activation endpoint separately
    location = /api/v1/activate {
        limit_req zone=activate burst=5 nodelay;
        proxy_pass http://licensing_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check (no rate limit) ──────────────────────────
    location /health {
        access_log off;
        proxy_pass http://licensing_api/health;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ── Static portal files ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|ico|svg|png|jpg|jpeg|gif|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ── Deny hidden files ─────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~ /\.env {
        deny all;
        return 404;
    }

    # ── Favicon ────────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}

