version: '3.8'

services:
  # ── Licensing API Server (FastAPI + Uvicorn) ─────────────────
  licensing-api:
    image: python:3.11-slim
    container_name: woven-licensing-api
    hostname: licensing-api
    working_dir: /app
    volumes:
      - ../../licensing-server/backend:/app
      - licensing_data:/app/data
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=sqlite:///data/woven_licensing.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SIGNING_KEY_SEED=${SIGNING_KEY_SEED:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@wovenmodel.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        python -c 'from app.database import init_db; init_db()' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
      "
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - licensing-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx Reverse Proxy + Static File Server ────────────────
  nginx:
    image: nginx:alpine
    container_name: woven-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/usr/share/nginx/html/portal:ro
    depends_on:
      - licensing-api
    restart: unless-stopped
    networks:
      - licensing-net

networks:
  licensing-net:
    driver: bridge

volumes:
  licensing_data: